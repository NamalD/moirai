# Dev workflow template — standard implement + review + fix cycle
# Uses Claude Code for implementation and Themis for review.
name: "dev-workflow"
description: "Standard dev workflow: implement with Claude Code, review with Themis, loop until approved"
version: 1

parameters:
  - name: project
    description: "Project directory path"
    required: true
  - name: prompt
    description: "Task description for the implementation step"
    required: true
  - name: max_loop_attempts
    description: "Maximum loop iterations for review-fix cycle"
    default: 5

workflow:
  id: "{{ .project | slugify }}-{{ .prompt | slugify }}"
  name: "{{ .project }}: {{ .prompt }}"
  version: 1

  tasks:
    - id: "implement"
      type: "agent"
      agent: "claude-dev"
      command: "claude --print --permission-mode bypassPermissions \"{{ .prompt }}\""
      deps: []
      max_retries: 2

    - id: "review-loop"
      type: loop
      max_iterations: {{ .max_loop_attempts }}
      terminate_on: "APPROVED"
      deps: ["implement"]
      # "review" must be the leaf step (deps: ["fix"], nothing depends on it):
      # LoopExecutor checks terminate_on against leaf-step output only, so the
      # step that renders the actual verdict has to be the one with no
      # dependents. Reviewer feedback reaches "fix" via the MOIRAI_PREV_OUTPUT
      # env var LoopExecutor injects (SPEC.md §7.4 item 6) -- never shell-
      # interpolated into the command string, since that's untrusted content
      # from an external tool and could otherwise inject shell syntax.
      steps:
        - id: "fix"
          type: "agent"
          agent: "claude-dev"
          command: "claude --print --permission-mode bypassPermissions \"Check the MOIRAI_PREV_OUTPUT and MOIRAI_LOOP_ITERATION environment variables (run printenv yourself to see them). If MOIRAI_PREV_OUTPUT is set, it contains feedback from the previous review pass -- address it. If not set, this is the first pass: review your own recent implementation and make only necessary corrections, or none if it already looks solid.\""
          deps: []
        - id: "review"
          agent: "themis-review"
          command: "hermes --profile themis chat -q \"Review the code changes just made in this project (working directory) for correctness, quality, and spec compliance against docs/architecture/initial-build/SPEC.md. Reply with the single word APPROVED if they're good to merge as-is, or specific actionable feedback describing exactly what needs to change if not.\""
          deps: ["fix"]
